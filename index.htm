<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PostPilot</title>
    <link rel="stylesheet" href="css/style.css" />

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <!-- navigation section -->
      <nav>
        <h2>This is navigation section</h2>
      </nav>
      <section class="banner_main_section">
        <div class="banner">
          <div class="banner_left">
            <h1>
              Meet your <br />
              <span class="special_font">favorite</span> new (old) <br />
              marketing channel.
            </h1>
            <p>
              Remarkable results. Easier than email. Postcard marketing <br />
              reinvented for modern ecommerce.
            </p>
            <div class="banner_left_mini_container">
              <button class="common_btn">Try it Risk-free</button>
              <div>
                <div>
                  <i class="fa fa-star"></i>
                  <i class="fa fa-star"></i>
                  <i class="fa fa-star"></i>
                  <i class="fa fa-star"></i>
                  <i class="fa fa-star"></i>
                </div>
                <p>5.0 Shopify Rating</p>
              </div>
            </div>
          </div>
          <div class="banner_right">
            <img src="./photos/banner_2.png" alt="" />
            <img src="./photos/banner_1.png" alt="" />
          </div>
        </div>
      </section>
    </header>

    <main>
      <!-- trusted section -->
      <section class="trusted_container">
        <h2>
          Trusted by thousands <br />
          of top DTC <span class="special_font">brands.</span>
        </h2>
        <div class="trusted_mini_container">
          <div>
            <div><img src="photos/trusted1.png" alt="" /></div>
            <img src="./photos/trustedbrand1.png" alt="" />
          </div>
          <div>
            <div><img src="photos/trusted2.png" alt="" /></div>
            <img src="./photos/trustedbrand2.png" alt="" />
          </div>
          <div>
            <div><img src="photos/trusted3.png" alt="" /></div>
            <img src="./photos/trustedbrand3.png" alt="" />
          </div>
          <div class="scotch_foter_trusted_image">
            <div><img src="photos/trusted4.png" alt="" /></div>
            <img src="./photos/trustedbrand4.png" alt="" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
